<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium UI Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function (d, t) {
        var g = document.createElement(t),
          s = d.getElementsByTagName(t)[0];
        g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        g.defer = true;
        g.async = true;
        s.parentNode.insertBefore(g, s);
        g.onload = function () {
          window.vapiSDK.run({
            apiKey: "d3fd3044-8895-4c1b-8107-8d7b4e514297", // Replace with your Vapi Public Key (usually starts with org_) if needed
            assistant: "d3fd3044-8895-4c1b-8107-8d7b4e514297", // Your Vapi Assistant ID
            config: {
              button: {
                position: "bottom-right",
                color: "#0ea5e9",
              }
            },
          });
        };
      })(document, "script");
    </script>
  </body>
</html>
